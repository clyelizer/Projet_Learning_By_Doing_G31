<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard Agricole{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand">🌱 Robot Agricole</a>
            <button class="nav-toggle" id="nav-toggle" aria-label="Menu">☰</button>
            <div class="nav-links" id="nav-links">
                <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">Dashboard</a>
                <a href="/data" class="nav-link {% if request.path == '/data' %}active{% endif %}">Données</a>
                <a href="/recommendations" class="nav-link {% if request.path == '/recommendations' %}active{% endif %}">Recommandations</a>
            </div>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>Robot Agricole Autonome — Projet Learning By Doing G31</p>
    </footer>

    <script>
    /* Hamburger menu toggle */
    (function() {
        var toggle = document.getElementById('nav-toggle');
        var links  = document.getElementById('nav-links');
        if (toggle && links) {
            toggle.addEventListener('click', function() {
                links.classList.toggle('open');
                toggle.textContent = links.classList.contains('open') ? '✕' : '☰';
            });
            /* Fermer si clic en dehors */
            document.addEventListener('click', function(e) {
                if (!toggle.contains(e.target) && !links.contains(e.target)) {
                    links.classList.remove('open');
                    toggle.textContent = '☰';
                }
            });
        }
    })();
    </script>
</body>
</html>
